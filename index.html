<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3Handz Arena</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="heading">
            <h1>3Handz Arena - The Ultimate Throwdown!</h1>
            <h1>Rock, Paper, Scissors - Fight for Glory!</h1>
        </div>
    </header>
    <main>
        <div class="mid">
            <div class="hand">
                <!-- <video class="bg" src="bgvid.mp4" autoplay muted loop></video> -->
                <div class="you"><img src="assets/rock.png" alt="rock"></div>
                <div class="vs"><video class="bg" src="assets/bgvid.mp4" autoplay muted loop></video></div>
                <div class="comp"><img src="assets/rock.png" alt="rock"></div>
            </div>
            <div class="msg"><h2>Let's play</h2></div>
        </div>
        <div class="options">
            <div class="rock btn" id="rock">
                <h2>Rock</h2>
            </div>
            <div class="paper btn" id="paper">
                <h2>Paper</h2>
            </div>
            <div class="scissors btn" id="scissors">
                <h2>Scissors</h2>
            </div>
        </div>
    </main>
    <footer>
        <div class="scorecard">
            <div class="yourscore">Your's Score :</div>
            <div class="compscore">Computer's Score :</div>
            <div class="resetbutton">RESET</div>
        </div>
    </footer>
    <script src="script.js"></script>
</body>

</html>
